<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¡Gracias! – Venezuela Solidaria</title>
  <meta http-equiv="refresh" content="5;url=index.html" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,40,120,0.1);
      border: 1px solid #dde3f0;
    }
    .big { font-size: 3.5rem; display: block; margin-bottom: 1rem; }
    h1 { font-size: 1.6rem; font-weight: 900; color: #003893; margin-bottom: .5rem; }
    p { font-size: .95rem; color: #555; line-height: 1.65; }
    .back-link {
      display: inline-block;
      margin-top: 1.75rem;
      background: #003893;
      color: #fff;
      text-decoration: none;
      padding: .75rem 2rem;
      border-radius: 50px;
      font-weight: 800;
      font-size: .95rem;
      transition: background .15s;
    }
    .back-link:hover { background: #002060; }
    .auto { font-size: .8rem; color: #aaa; margin-top: .75rem; }
    .flag { height: 5px; background: linear-gradient(to right, #FCD116 33.3%, #003893 33.3% 66.6%, #CF142B 66.6%); border-radius: 5px; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <span class="big">🙏</span>
    <h1>¡Gracias!</h1>
    <p>Tu mensaje fue recibido. El equipo lo revisará lo antes posible.<br/>Juntos hacemos más fuerza. 🇻🇪</p>
    <a href="index.html" class="back-link">← Volver al directorio</a>
    <p class="auto">Serás redirigido automáticamente en 5 segundos…</p>
    <div class="flag"></div>
  </div>
</body>
</html>
